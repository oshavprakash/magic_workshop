<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your todos · To Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header header--row">
      <div>
        <h1 class="logo">To Do List</h1>
        <p class="tagline" id="greeting">Your todos</p>
      </div>
      <button type="button" id="logout" class="btn btn--secondary">Log out</button>
    </header>
    <main class="main">
      <section class="card">
        <form id="todo-form" class="form form--inline">
          <div class="field field--grow">
            <input type="text" id="title" placeholder="New todo…" required maxlength="200" />
          </div>
          <div class="field field--grow">
            <input type="text" id="description" placeholder="Description (optional)" maxlength="500" />
          </div>
          <button type="submit" class="btn btn--primary">Add</button>
        </form>
        <ul id="list" class="list"></ul>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
